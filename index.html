<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Valentine Love Letter</title>
    

    <!-- Google Font -->
     <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"/>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);
</script>




</head>


<body>

<div class="background-glow"></div>

<div id="hearts"></div>

<section class="hero">

    <h2>
        Shaana's
        <span>Love Letter to</span>
        Piddu
    </h2>

    <p class="subtitle">
        A special message for someone special ❤️
    </p>

</section>

<section class="letter-section">

<div class="envelope-wrapper">

    <!-- Back -->

    <div class="envelope-back"></div>

    <!-- Letter -->

    <div class="letter">

    <div id="loveText"></div>

</div>

    <!-- Top Flap -->

    <div class="flap" id="flap"></div>

    <!-- Left -->

    <div class="left"></div>

    <!-- Right -->

    <div class="right"></div>

    <!-- Bottom -->

    <div class="bottom"></div>

</div>

<div class="buttons">

<button id="open">
<!-- 
<i class="fa-regular fa-envelope-open"></i> -->

Open

</button>

<button id="close">

<i class="fa-solid fa-xmark"></i>

Close

</button>

</div>

</section>

<section class="cards">

<div class="card">

<i class="fa-regular fa-heart"></i>

<h3>Made with Love</h3>

<p>

Every word comes directly from my heart.

</p>

</div>

<div class="card">

<i class="fa-solid fa-sparkles"></i>

<h3>Just For You</h3>

<p>

Because you deserve every smile.

</p>

</div>

<div class="card">

<i class="fa-solid fa-gift"></i>

<h3>Forever</h3>

<p>

Today,
Tomorrow,
Always.

</p>

</div>

</section>

<footer>

Once Again, I Love You ❤️

</footer>

<div id="heartContainer"></div>

<script src="script.js"></script>

</body>
</html>
